# Modern eBPF probe is shipped inside the Falco binary and works on the
# AKS default node image (Ubuntu, kernel 5.8+). No kernel module build needed.
driver:
  kind: modern_ebpf

# Custom rule for attack #6: a shell process being spawned inside a container.
# The application images are hardened (Alpine + JRE, no bash/nc), so an attacker
# who gains code execution must spawn a shell (/bin/sh) to get interactive
# access — which is exactly what a reverse shell does first. Detecting the
# shell spawn catches the attack reliably on the real, hardened pod. Reuses the
# default `spawned_process` / `container` macros and `shell_binaries` list.
customRules:
  reverse-shell.yaml: |-
    - rule: Shell Spawned In Container
      desc: >
        A shell process was started inside a running container. The banking
        services never spawn a shell at runtime, so this indicates an
        interactive/reverse shell following a container compromise.
      condition: >
        spawned_process
        and container
        and proc.name in (shell_binaries)
      output: >
        Shell spawned in container
        (user=%user.name container=%container.name image=%container.image.repository
        shell=%proc.name parent=%proc.pname cmdline=%proc.cmdline)
      priority: CRITICAL
      tags: [container, process, mitre_execution, T1059]
